<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>派車工具</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }
    th { background: #f0f0f0; }
    button { margin-top: 10px; padding: 8px 12px; margin-right: 5px; }
    textarea { width: 100%; height: 220px; margin-top: 10px; }
    select { padding: 4px; }

    /* ⭐ 只新增這段：放大上傳按鈕 */
    #upload {
      font-size: 20px;
      padding: 12px 16px;
      border: 2px solid #444;
      border-radius: 8px;
      background: #f5f5f5;
      cursor: pointer;
    }

    .factory1 { background: #ffcdd2; }
    .factory2 { background: #c8e6c9; }
    .greenDriverFactory1 { background: #fff59d; }
    .factory2Green { background: #bbdefb; }
    .selfsend { background: #e0e0e0; }

    .legend span { margin-right:10px; padding:4px 8px; }
  </style>
</head>

<body>

<h2>Excel → LINE 出貨工具</h2>

<div class="legend">
  <span style="background:#ffcdd2">一廠</span>
  <span style="background:#c8e6c9">二廠</span>
  <span style="background:#fff59d">一廠+綠園司機</span>
  <span style="background:#bbdefb">二廠+綠園司機</span>
  <span style="background:#e0e0e0">廠商自送</span>
</div>

<div>
  日期：<input type="text" id="dateInput" oninput="updateDateInfo()">
  👉 <span id="dateInfo"></span>
</div>

<div>🔍 搜尋：<input type="text" id="search" oninput="renderTable()"></div>

<input type="file" id="upload" accept=".xlsx,.xls" />

<table id="table"></table>

<button onclick="generateText()">產生LINE文字</button>

<h3>綠園司機</h3>
<button onclick="copyText('greenOutput')">複製</button>
<textarea id="greenOutput"></textarea>

<h3>阿駿物流</h3>
<button onclick="copyText('ajunOutput')">複製</button>
<textarea id="ajunOutput"></textarea>

<h3>廠商自送</h3>
<button onclick="copyText('selfOutput')">複製</button>
<textarea id="selfOutput"></textarea>

<script>
let data = [];
let excelDate = '';

function isSelfSend(row){
  const note = (row.備註 || '')
    .replace(/\s/g,'')
    .replace(/\r?\n/g,'');
  return note.includes('廠商自送');
}

function updateDateInfo(){
  const val = dateInput.value.trim();
  if(!val){ dateInfo.innerText=''; return; }

  let parts = val.split('/');
  let year = new Date().getFullYear();
  let month, day;

  if(parts.length === 3){
    year = parseInt(parts[0]);
    month = parseInt(parts[1]);
    day = parseInt(parts[2]);
  }else{
    month = parseInt(parts[0]);
    day = parseInt(parts[1]);
  }

  const d = new Date(year, month-1, day);
  const w = ['日','一','二','三','四','五','六'][d.getDay()];
  const start = new Date(year, 0, 1);
  const diff = Math.floor((d - start) / 86400000) + 1;
  const dayNum = String(diff).padStart(3,'0');

  dateInfo.innerText = `（${w}｜太陽日${dayNum}）`;
}

function getDateText(){
  const val = excelDate || dateInput.value.trim();
  if(!val) return '';

  let parts = val.split('/');
  let year = new Date().getFullYear();
  let month, day;

  if(parts.length === 3){
    year = parseInt(parts[0]);
    month = parseInt(parts[1]);
    day = parseInt(parts[2]);
  }else{
    month = parseInt(parts[0]);
    day = parseInt(parts[1]);
  }

  const d = new Date(year, month-1, day);
  const w = ['日','一','二','三','四','五','六'][d.getDay()];
  const start = new Date(year, 0, 1);
  const diff = Math.floor((d - start) / 86400000) + 1;
  const dayNum = String(diff).padStart(3,'0');

  return `${val}（${w}｜太陽日${dayNum}）`;
}

function updateRowColor(i){
  const rowEl = document.querySelector(`input[data-index='${i}']`).closest('tr');
  const row = data[i];

  if(isSelfSend(row)){
    rowEl.className = 'selfsend';
    return;
  }

  const f = document.querySelector(`[data-factory='${i}']`).value;
  const l = document.querySelector(`[data-logistics='${i}']`).value;

  let cls = '';

  if(f === '一廠' && l === '綠園司機'){
    cls = 'greenDriverFactory1';
  }else if(f === '二廠' && l === '綠園司機'){
    cls = 'factory2Green';
  }else if(f === '一廠'){
    cls = 'factory1';
  }else{
    cls = 'factory2';
  }

  rowEl.className = cls;
}

const specialItems = [
  '家樂福有機金針菇200g','家樂福有機銀耳200g','有機活株韓小菇200g',
  '家樂福有機黑美人菇150g','一寸鮮芽苗綜合箱','三日苗-超級青花苗50g',
  '升級版_紫高麗苗-紫高麗苗','三日苗+升級版紫高麗苗','有機彥廷黑木耳450g',
  '家樂福有機特級杏鮑菇1kg','有機金針菇(森甜金菇)333g','有機57號地瓜500g',
  '家樂福有機雙響菇150G','有機酸菜400g','有機酸白菜400g','有機銀耳露200ml',
  '彥廷乾木耳50G','新社農會嚴選特級冬菇20g','有機金滑菇250g'
];

upload.onchange = e=>{
  const r = new FileReader();
  r.onload = e=>{
    const wb = XLSX.read(e.target.result,{type:'binary'});
    const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});

    const row4 = raw[3] || [];
    excelDate = '';

    for(let cell of row4){
      if(!cell) continue;

      if(typeof cell === 'number'){
        const d = XLSX.SSF.parse_date_code(cell);
        if(d){
          excelDate = `${d.y}/${d.m}/${d.d}`;
          break;
        }
      }

      if(typeof cell === 'string'){
        const match = cell.match(/\d{4}\/\d{1,2}\/\d{1,2}/);
        if(match){
          excelDate = match[0];
          break;
        }
      }
    }

    if(excelDate){
      dateInput.value = excelDate;
      updateDateInfo();
    }

    data = raw.slice(5).map(r=>({
      品名:(r[1]||'')+'',
      件數:r[5]||'',
      備註:(r[6]||'')+''
    })).filter(r=>r.品名);

    renderTable();
  };
  r.readAsBinaryString(e.target.files[0]);
};

function renderTable(){
  const keyword = search.value.trim();
  table.innerHTML='<tr><th>廠區</th><th>物流</th><th>選擇</th><th>品名</th><th>件數</th><th>備註</th></tr>';

  data.forEach((row,i)=>{
    if(keyword && !row.品名.includes(keyword)) return;

    let f='二廠', l='阿駿物流';

    if(
      row.品名.includes('代運') ||
      row.備註.includes('直達') ||
      row.備註.includes('派車給綠園司機')
    ){
      f='一廠'; l='綠園司機';
    }
    else if(specialItems.some(x=>row.品名.includes(x))){
      f='一廠'; l='阿駿物流';
    }

    let cls='';

    if(isSelfSend(row)){
      cls='selfsend';
      table.innerHTML+=`
      <tr class="${cls}">
        <td>-</td>
        <td>廠商自送</td>
        <td><input type="checkbox" data-index="${i}" checked></td>
        <td>${row.品名}</td>
        <td>${row.件數}</td>
        <td>${row.備註}</td>
      </tr>`;
      return;
    }

    if(f==='一廠'&&l==='綠園司機') cls='greenDriverFactory1';
    else if(f==='二廠'&&l==='綠園司機') cls='factory2Green';
    else if(f==='一廠') cls='factory1';
    else cls='factory2';

    table.innerHTML+=`
    <tr class="${cls}">
      <td><select data-factory="${i}" onchange="updateRowColor(${i})">
        <option ${f==='一廠'?'selected':''}>一廠</option>
        <option ${f==='二廠'?'selected':''}>二廠</option>
      </select></td>
      <td><select data-logistics="${i}" onchange="updateRowColor(${i})">
        <option ${l==='阿駿物流'?'selected':''}>阿駿物流</option>
        <option ${l==='綠園司機'?'selected':''}>綠園司機</option>
      </select></td>
      <td><input type="checkbox" data-index="${i}" checked></td>
      <td>${row.品名}</td>
      <td>${row.件數}</td>
      <td>${row.備註}</td>
    </tr>`;
  });
}

function generateText(){
  const checked=document.querySelectorAll('input[type=checkbox]:checked');

  let groups={
    '綠園司機':{一廠:[],二廠:[],直達:[],代運:[]},
    '阿駿物流':{一廠:[],二廠:[],直達:[],代運:[]},
    '自送':[]
  };

  checked.forEach(cb=>{
    const i=cb.dataset.index;
    const row=data[i];

    if(isSelfSend(row)){
      groups['自送'].push(`${row.品名}-${row.件數}`);
      return;
    }

    const f=document.querySelector(`[data-factory='${i}']`).value;
    const l=document.querySelector(`[data-logistics='${i}']`).value;

    if(row.品名.includes('代運')){
      groups[l].代運.push(`${row.品名}-${row.件數}`);
    }
    else if(row.備註.includes('直達')){
      groups[l].直達.push(`${row.品名}-${row.件數}`);
    }
    else{
      groups[l][f].push(`${row.品名}-${row.件數}`);
    }
  });

  const makeText=(name,g)=>{
    let t=getDateText()+'\n'+name+'\n';

    let sections=[];
    if(g.一廠.length) sections.push(['一廠',g.一廠]);
    if(g.二廠.length) sections.push(['二廠',g.二廠]);
    if(g.直達.length) sections.push(['直達',g.直達]);
    if(g.代運.length) sections.push(['代運',g.代運]);

    sections.forEach((s,i)=>{
      t+=s[0]+'\n'+s[1].join('\n');
      if(i!==sections.length-1) t+='\n-----\n';
    });

    return t.trim();
  };

  greenOutput.value = makeText('綠園司機',groups['綠園司機']);
  ajunOutput.value = makeText('阿駿物流',groups['阿駿物流']);

  if(groups['自送'].length){
    selfOutput.value =
      getDateText()+'\n廠商自送\n'+
      groups['自送'].join('\n');
  }else{
    selfOutput.value = '';
  }
}

function copyText(id){
  const el=document.getElementById(id);
  el.select();
  document.execCommand('copy');
  alert('已複製！');
}
</script>

</body>
</html>
